<!DOCTYPE html>

<html>
<head>
<meta http-equiv="refresh" content="2">

<style>

#hoja{
    background:#0f172a;
    font-family:Arial;
    text-align:center;
    color:white;
}

#titulo{
    color:#22c55e;
    font-size:40px;
}

#menu{
    margin:20px;
}

#menu a{
    padding:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

#radar{
    width:400px;
    height:400px;
    border:4px solid #22c55e;
    border-radius:50%;
    margin:auto;
    position:relative;
}

#linea1{
    position:absolute;
    top:198px;
    left:0;
    width:400px;
    border-top:2px solid #22c55e;
}

#linea2{
    position:absolute;
    left:198px;
    top:0;
    height:400px;
    border-left:2px solid #22c55e;
}

#punto{
    position:absolute;

    left:
    {% if ejeX > 0 %}
        260px
    {% else %}
        120px
    {% endif %};

    top:
    {% if ejeY > 0 %}
        120px
    {% else %}
        260px
    {% endif %};

    width:25px;
    height:25px;
    background:red;
    border-radius:50%;
    box-shadow:0px 0px 20px red;
}

</style>

</head>

<body id="hoja">

<h1 id="titulo">Radar XY</h1>

<div id="menu">
<a href="/">Inicio</a>
<a href="/radar">Radar</a>
<a href="/joystick">Joystick</a>
</div>

<h2>Eje X: {{ ejeX }}</h2>
<h2>Eje Y: {{ ejeY }}</h2>

<div id="radar">
    <div id="linea1"></div>
    <div id="linea2"></div>
    <div id="punto"></div>
</div>

</body>
</html>
